# =============================================================================
# Logstash Pipeline: ML Training Metrics Ingestion
# =============================================================================
# Reads structured JSON logs produced by the ML training pipeline and
# indexes them into Elasticsearch for visualization in Kibana.
#
# Before running, update the elasticsearch output section with your:
#   - Elasticsearch password
#   - CA certificate path
#   - Training log path (input section)
#
# Run:
#   bin/logstash -f /path/to/logstash.conf
# =============================================================================

input {
  file {
    path => "/home/tajwa/elk_lab/ELK_Labs/ELK_STACK/training.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"

    # Each line in training.log is a self-contained JSON object (JSON Lines)
    codec => json {
      charset => "UTF-8"
    }

    # File discovery settings
    discover_interval => 5
    stat_interval => 1

    # Static tags applied to every event from this input
    tags => ["ml-training", "network-intrusion-detection"]
  }
}

# =============================================================================
# Filter: enrich, type-cast, and clean events
# =============================================================================
filter {

  # ---------------------------------------------------------------------------
  # 1. Parse the ISO-8601 timestamp from the JSON into @timestamp
  # ---------------------------------------------------------------------------
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => ["_timestamp_parse_failure"]
      remove_field => ["timestamp"]
    }
  }

  # ---------------------------------------------------------------------------
  # 2. Normalize the log level to lowercase
  # ---------------------------------------------------------------------------
  if [level] {
    mutate {
      lowercase => ["level"]
      rename => { "level" => "log_level" }
    }
  }

  # ---------------------------------------------------------------------------
  # 3. Type-cast numeric fields so Elasticsearch maps them correctly and
  #    Kibana can run aggregations (sum, avg, max, min, percentiles).
  # ---------------------------------------------------------------------------
  if [data][accuracy] {
    mutate {
      convert => {
        "[data][accuracy]"               => "float"
        "[data][f1_score]"               => "float"
        "[data][precision]"              => "float"
        "[data][recall]"                 => "float"
        "[data][roc_auc]"                => "float"
        "[data][false_positive_rate]"    => "float"
        "[data][false_negative_rate]"    => "float"
        "[data][true_positive_rate]"     => "float"
        "[data][true_negative_rate]"     => "float"
        "[data][training_time_seconds]"  => "float"
        "[data][true_positives]"         => "integer"
        "[data][true_negatives]"         => "integer"
        "[data][false_positives]"        => "integer"
        "[data][false_negatives]"        => "integer"
        "[data][test_samples]"           => "integer"
      }
    }
  }

  if [data][total_samples] {
    mutate {
      convert => {
        "[data][total_samples]"    => "integer"
        "[data][normal_traffic]"   => "integer"
        "[data][attack_traffic]"   => "integer"
        "[data][attack_ratio]"     => "float"
        "[data][num_features]"     => "integer"
      }
    }
  }

  if [data][train_samples] {
    mutate {
      convert => {
        "[data][train_samples]"       => "integer"
        "[data][test_samples]"        => "integer"
        "[data][train_attack_ratio]"  => "float"
        "[data][test_attack_ratio]"   => "float"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # 4. Enrich every event with pipeline metadata
  # ---------------------------------------------------------------------------
  mutate {
    add_field => {
      "pipeline_name"    => "ml-training-metrics"
      "pipeline_version" => "2.0"
      "environment"      => "development"
    }
  }

  # ---------------------------------------------------------------------------
  # 5. Remove noisy fields added by the file input plugin
  # ---------------------------------------------------------------------------
  mutate {
    remove_field => ["host", "path", "@version"]
  }

  # ---------------------------------------------------------------------------
  # 6. Drop events that failed JSON parsing (malformed lines)
  # ---------------------------------------------------------------------------
  if "_jsonparsefailure" in [tags] {
    drop {}
  }
}

# =============================================================================
# Output: Elasticsearch + console debug
# =============================================================================
output {

  # ---------------------------------------------------------------------------
  # Primary: Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch {
    hosts    => ["https://localhost:9200"]
    index    => "ml-training-metrics-%{+YYYY.MM.dd}"
    user     => "elastic"
    password => "tlHmWHek8hb2bVM+2nrQ"

    # TLS / SSL
    ssl_enabled              => true
    ssl_verification_mode    => "full"
    ssl_certificate_authorities => ["/home/tajwa/elk_lab/elasticsearch-9.3.2/config/certs/http_ca.crt"]

    # Retry on version conflict (optimistic concurrency)
    retry_on_conflict => 3
  }

  # ---------------------------------------------------------------------------
  # Secondary: Console (useful for debugging — remove in production)
  # ---------------------------------------------------------------------------
  stdout {
    codec => rubydebug {
      metadata => false
    }
  }
}
