program: phase2_train.py
method: bayes
metric:
  name: val/f1
  goal: maximize

parameters:
  model_type:
    values:
      - xgboost
      - lightgbm
      - random_forest

  learning_rate:
    distribution: log_uniform_values
    min: 0.001
    max: 0.3

  max_depth:
    values:
      - 3
      - 5
      - 7
      - 10

  n_estimators:
    values:
      - 50
      - 100
      - 200
      - 300

  min_child_weight:
    values:
      - 1
      - 3
      - 5

  subsample:
    distribution: uniform
    min: 0.6
    max: 1.0

  colsample_bytree:
    distribution: uniform
    min: 0.6
    max: 1.0

early_terminate:
  type: hyperband
  min_iter: 3
